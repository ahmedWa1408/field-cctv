<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>سجل العمليات السابقة</title>

<link rel="stylesheet" href="history.css">

</head>

<body>

<header class="topHeader">

<h1>سجل العمليات السابقة</h1>

<p>إدارة أنظمة المراقبة الأمنية - قسم التشغيل CCTV</p>

</header>

<div class="container">

<div class="card">

<h2>البحث</h2>

<div class="filters">

<input
type="text"
id="searchInput"
placeholder="بحث برقم الخطة أو اسم المسار أو المشغل">

<input
type="date"
id="dateFilter">

<input
type="text"
id="carFilter"
placeholder="رقم السيارة">

<button id="searchBtn">

بحث

</button>

</div>

</div>

<div class="card">

<h2>الإحصائيات</h2>

<div class="stats">

<div class="stat">

<span id="totalMissions">0</span>

<p>إجمالي المهام</p>

</div>

<div class="stat">

<span id="finishedMissions">0</span>

<p>المكتملة</p>

</div>

<div class="stat">

<span id="unfinishedMissions">0</span>

<p>غير المكتملة</p>

</div>

<div class="stat">

<span id="totalSitesDone">0</span>

<p>المواقع المنجزة</p>

</div>

</div>

</div><div class="card">

<h2>سجل المهام</h2>

<div class="tableWrapper">

<table id="historyTable">

<thead>

<tr>

<th>الخطة</th>

<th>المسار</th>

<th>التاريخ</th>

<th>المشغل</th>

<th>السيارة</th>

<th>مدة العمل</th>

<th>الإنجاز</th>

<th>الحالة</th>

<th>الإجراءات</th>

</tr>

</thead>

<tbody id="historyBody">

</tbody>

</table>

</div>

</div>

<div class="card">

<div class="actions">

<button id="refreshBtn">

🔄 تحديث

</button>

<button id="printAllBtn">

🖨️ طباعة السجل

</button>

<button id="exportPdfBtn">

📄 تصدير PDF

</button>

<button id="exportExcelBtn">

📊 تصدير Excel

</button>

</div>

</div>

</div>

<script src="history.js"></script>

</body>

</html>

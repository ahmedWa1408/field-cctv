<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحركة الميدانية - قسم التشغيل CCTV</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- شاشة البداية -->

<div id="splashScreen" class="splash">

    <img src="images/logo.png" class="logo">

    <h1>إدارة أنظمة المراقبة الأمنية</h1>

    <h2>قسم التشغيل CCTV</h2>

</div>

<!-- رسالة الترحيب -->

<div id="welcomeScreen" class="welcome hidden">

    <div class="card">

        <h1>مرحباً بكم</h1>

        <p>

نسأل الله لكم التوفيق والسلامة

في أداء مهامكم الميدانية.

        </p>

        <button id="startBtn">

بدء العمل

        </button>

    </div>

</div>

<!-- الصفحة الرئيسية -->

<div id="homePage" class="hidden">

<header>

<div class="title">

<img src="images/logo.png" class="small-logo">

<div>

<h1>

الحركة الميدانية

</h1>

<p>

قسم التشغيل CCTV

</p>

</div>

</div>

</header>

<section class="search-card">

<h2>

بيانات الخطة

</h2>

<label>

رقم الخطة

</label>

<div class="search-row">

<input

type="number"

id="planNumber"

placeholder="أدخل رقم الخطة"

>

<button id="searchBtn">

بحث

</button>

</div>

<label>

اسم المسار

</label>

<input

type="text"

id="routeName"

readonly

>

<div class="buttons">

<button

id="historyBtn"

style="display:none;"

>

📁 سجل العمليات السابقة للخطة

</button>

<button

id="missionBtn"

style="display:none;"

>

▶ بدء المهمة

</button>

</div>

</section>

<footer>

إدارة أنظمة المراقبة الأمنية

قسم التشغيل CCTV

</footer>

</div>

<script src="plans.js"></script>

<script src="app.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحركة الميدانية | CCTV</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="page">

<header class="header">

<img src="IMG_3707.jpeg" class="logo">

<h1>الحركة الميدانية</h1>

<p>قسم التشغيل CCTV</p>

</header>

<div class="card">

<h2>بيانات الخطة</h2>

<label>رقم الخطة</label>

<div class="searchBox">

<input
type="number"
id="planNumber"
placeholder="أدخل رقم الخطة">

<button id="searchBtn">
بحث
</button>

</div>

<label>اسم المسار</label>

<input
type="text"
id="routeName"
readonly
placeholder="سيظهر اسم المسار">

<button id="missionBtn">
بدء المهمة
</button>

<button id="historyBtn">
سجل العمليات السابقة
</button>

</div>

<footer>

إدارة أنظمة المراقبة الأمنية<br>

قسم التشغيل CCTV

</footer>

</div>

<script src="plans.js"></script>
<script src="app.js"></script>

</body>

</html>

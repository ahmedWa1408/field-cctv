<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحركة الميدانية لقسم التشغيل CCTV</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header class="top-header">

<div class="logo-area">

<img src="images/logo.png" class="logo" alt="شعار">

<div class="title-box">

<h1>الحركة الميدانية</h1>

<p>لقسم التشغيل CCTV</p>

</div>

</div>

</header>

<section class="welcome-card" id="welcomeCard">

<h2>مرحباً بكم</h2>

<p>

نسأل الله لكم التوفيق والسلامة في أداء مهامكم الميدانية.

</p>

<button id="startButton">

بدء العمل

</button>

</section>

<section class="plan-card">

<h2>بيانات الخطة</h2>

<div class="plan-search">

<div class="input-group">

<label>رقم الخطة</label>

<input
type="number"
id="planNumber"
placeholder="أدخل رقم الخطة">

</div>

<div class="button-group">

<button
id="searchButton"
onclick="searchPlan()">

بحث

</button>

</div>

</div>

<div
class="route-card"
id="routeCard"
style="display:none;">

<label>

اسم المسار

</label>

<input
type="text"
id="routeName"
readonly>

<button
class="history-btn"
id="historyButton">

📁 سجل العمليات السابقة للخطة

</button>

<button
class="start-task-btn"
id="missionButton">

▶ بدء المهمة

</button>

</div>

</section><section
class="employee-card"
id="employeeCard"
style="display:none;">

<h2>بيانات الموظف</h2>

<div class="grid">

<div>

<label>اسم الموظف</label>

<input
type="text"
id="employeeName">

</div>

<div>

<label>الرقم الوظيفي</label>

<input
type="text"
id="employeeId">

</div>

<div>

<label>رقم السيارة</label>

<input
type="text"
id="carNumber">

</div>

<div>

<label>رقم اللابتوب</label>

<input
type="text"
id="laptopNumber">

</div>

<div>

<label>عدد الفلاشات</label>

<input
type="number"
id="flashCount">

</div>

<div>

<label>عدد الهاردسكات</label>

<input
type="number"
id="hardCount">

</div>

</div>

</section>

<section
class="sites-card"
id="sitesCard"
style="display:none;">

<h2>جدول المواقع</h2>

<div id="sitesTable"></div>

</section>

<section
class="notes-card"
id="notesCard"
style="display:none;">

<h2>الملاحظات العامة</h2>

<textarea
id="generalNotes"
rows="5"
placeholder="اكتب الملاحظات العامة هنا..."></textarea>

<label>الصور العامة</label>

<input
type="file"
id="generalImages"
multiple
accept="image/*">

</section>

<section
class="supervisor-card"
id="supervisorCard"
style="display:none;">

<h2>اعتماد مشرف الفترة</h2>

<div class="grid">

<div>

<label>مشرف الفترة</label>

<input
type="text"
id="supervisorName">

</div>

<div>

<label>رقم ID</label>

<input
type="text"
id="supervisorId">

</div>

<div class="approve-box">

<button
class="approve-btn">

✔ اعتماد

</button>

</div>

</div>

</section><section
class="action-buttons"
id="actionButtons"
style="display:none;">

<button class="save-btn">

💾 حفظ العملية

</button>

<button class="pdf-btn">

📄 تصدير PDF

</button>

<button class="print-btn">

🖨️ طباعة

</button>

</section>

<footer>

<p>

إدارة أنظمة المراقبة الأمنية – قسم التشغيل CCTV

</p>

<p>

© جميع الحقوق محفوظة

</p>

</footer>

</div>

<script src="plans.js"></script>

<script src="app.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>الحركة الميدانية CCTV</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- شاشة الشعار -->

<div id="splashScreen" class="splash">

<img
src="assets/logo.png"
class="logo"
alt="Logo">

<h2>إدارة أنظمة المراقبة الأمنية</h2>

<p>قسم التشغيل CCTV</p>

</div>



<!-- شاشة الترحيب -->

<div id="welcomeScreen" class="welcome hidden">

<div class="welcomeCard">

<h1>

الحركة الميدانية

</h1>

<p>

نسأل الله لكم التوفيق والسلامة
في أداء مهامكم الميدانية.

</p>

<button id="startSystemBtn">

دخول النظام

</button>

</div>

</div>



<!-- الصفحة الرئيسية -->

<div id="homePage" class="hidden">

<header class="mainHeader">

<div>

<h1>

الحركة الميدانية

</h1>

<p>

قسم التشغيل CCTV

</p>

</div>

<div>

<img
src="assets/logo.png"
class="headerLogo">

</div>

</header><section class="searchSection">

<div class="searchCard" id="searchCard">

<h2>بيانات الخطة</h2>

<label>رقم الخطة</label>

<input
type="number"
id="planNumber"
placeholder="أدخل رقم الخطة">

<button id="searchBtn">

بحث

</button>

</div>



<div class="routeCard hidden" id="routeCard">

<h2>بيانات المسار</h2>

<label>اسم المسار</label>

<input
type="text"
id="routeName"
readonly>

<button id="backBtn">

⬅ رجوع

</button>

</div>



<div
class="actionButtons hidden"
id="actionButtons">

<button id="missionBtn">

🚗 بدء المهمة

</button>

<button id="historyBtn">

📋 سجل العمليات

</button>

<button id="adminBtn">

🛠 الإدارة

</button>

<button id="settingsBtn">

⚙️ الإعدادات

</button>

</div>

</section><footer class="mainFooter">

<div>

إدارة أنظمة المراقبة الأمنية

</div>

<div>

قسم التشغيل CCTV

</div>

<div>

الإصدار 1.0

</div>

</footer>

</div>

<!-- JavaScript -->

<script src="plans.js"></script>

<script src="app.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سجلات المواقع</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>سجلات المواقع</h1>

<div class="search-box">

<label>رقم الخطة</label>

<div class="search-row">

<input
type="number"
id="planNumber"
placeholder="أدخل رقم الخطة">

<button onclick="searchPlan()">

بحث

</button>

</div>

</div>

<div class="route-box">

<label>اسم المسار</label>

<input
type="text"
id="routeName"
readonly
placeholder="سيظهر تلقائياً بعد البحث">

</div>

<hr>

<h2>بيانات الموظف</h2>

<label>الاسم</label>
<input type="text" id="employeeName">

<label>الرقم الوظيفي</label>
<input type="text" id="employeeId">

<label>رقم السيارة</label>
<input type="text" id="carNumber">

<label>رقم اللابتوب</label>
<input type="text" id="laptop">

<label>عدد الفلاشات</label>
<input type="number" id="flashCount">

<label>عدد الهاردسكات</label>
<input type="number" id="hardCount">

<hr>

<h2>جدول المواقع</h2>

<div id="sitesTable"></div>

</div>

<script src="plans.js"></script>

<script src="app.js"></script>

</body>

</html>

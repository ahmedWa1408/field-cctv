<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحركة الميدانية | CCTV</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- شاشة الشعار -->

<div id="splashScreen" class="splash">

<img src="IMG_3707.jpeg" class="logo" alt="Tahakom">

</div>

<!-- شاشة الترحيب -->

<div id="welcomeScreen" class="welcome hidden">

<div class="welcome-card">

<h1>الحركة الميدانية</h1>

<h2>قسم التشغيل CCTV</h2>

<div class="line"></div>

<p>

نسأل الله لكم التوفيق والسلامة
<br>
في أداء مهامكم الميدانية.

</p>

</div>

</div>

<!-- الصفحة الرئيسية -->

<div id="homePage" class="hidden">

<header>

<h1>الحركة الميدانية</h1>

<p>قسم التشغيل CCTV</p>

</header>

<section class="search-card">

<div id="searchCard">

<h2>بيانات الخطة</h2>

<label>رقم الخطة</label>

<input
type="number"
id="planNumber"
placeholder="أدخل رقم الخطة">

<button id="searchBtn">

بحث

</button>

</div><div id="routeCard" class="hidden">

<h2>اسم المسار</h2>

<input
type="text"
id="routeName"
readonly>

<button id="backBtn">

⬅ الرجوع لرقم الخطة

</button>

</div>

<div id="actionButtons" class="buttons hidden">

<button id="missionBtn">

▶ بدء المهمة

</button>

<button id="historyBtn">

📁 سجل العمليات السابقة

</button>

</div>

</section>

<footer>

إدارة أنظمة المراقبة الأمنية

<br>

قسم التشغيل CCTV

</footer>

</div><script src="plans.js"></script>
<script src="app.js"></script>

</body>
</html>
